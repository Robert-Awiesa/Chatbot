<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body{
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0;
      }
      .send-button{
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 15px 22px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
      }

      .chat-input{
        padding: 10px 15px;
        border-radius: 5px;
        font-size: 15px;
        flex-grow: 1;
        
      }

      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }

      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
        
      }

      .chat-message-robot{
        display: flex;
        justify-content: start;
        align-items: start;
      }
      .chat-messages-text{
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        margin-right: 10px;
        margin-left: 10px;
        max-width: 300px;
      }
      .chat-message-profile{
        width: 45px;
      }
      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script src="https://unpkg.com/supersimpledev/Chatbot.js"></script>

    <script type="text/babel">
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState("");

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        

        async function sendMessage() {
          if(!inputText.trim()){
            return
          }
          //User message
          const newMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];
          setInputText("");

          // while async await is feting the message online this shows a loading message
          setChatMessages([
            ...newMessages,
            {
              message: "Loading...........",
              sender: "robot",
              id: "Loading....",
            },
          ]);

            //After the response arrives, the loading message is replaced by the robots response
          const response = await Chatbot.getResponseAsync  (inputText);
          setChatMessages([
            ...newMessages,
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID(),
            },
          ]);
        }
        // An event lister for enter key to send message.
        function keyPress(event) {
          const key = event.key;
          if (key === "Enter") {
            sendMessage();
          } else if (key === "Escape") {
            setInputText("");
          }
        }
        return (
          <div className="chat-input-container">
            <input
              className="chat-input"
              placeholder="Send a message to chatbot"
              size="30"
              onChange={saveInputText}
              value={inputText}
              onKeyDown={keyPress}
            />
            <button className="send-button" onClick={sendMessage}>Send</button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        //const message = props.message;
        //const sender = props.sender;
        //const {message, sender} = props;

        /*if(sender === 'robot'){
        return(
          <div>
            
            {message}
          </div>
      )
      }
      */

        return (
          //position of messages
          //adding a ternary operator class to target bot user and robot classes
          <div className={
            sender === "user"
            ?"chat-message-user"
            :"chat-message-robot"
          }>
            {sender === "robot" && <img src="robot.png" className="chat-message-profile" />}
            <div className="chat-messages-text">
              {message}
            </div>
            
            {sender === "user" && <img src="user.png" className="chat-message-profile" />}
          </div>
        );
      }

      function ChatMessages({ chatMessages }) {
        // returining list of messages
        return (
          <div className="chat-messages-container">
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        //Lifting states for every component to be abe to access chatmessages when needed.
        const [chatMessages, setChatMessages] = React.useState([
          {
            message: "Hello chatbot",
            sender: "user",
            id: "id1",
          },
          {
            message: "Hello! How can I help you?",
            sender: "robot",
            id: "id2",
          },
          {
            message: "what is todays date?",
            sender: "user",
            id: "id3",
          },
          {
            message: "Today is June 2",
            sender: "robot",
            id: "id4",
          },
        ]);
        //array destructuring
        //const [chatmessages, setChatMessages] = array;
        //const chatMessages = array[0];
        //const setChatMessages = array[1]
        return (
          <div className="app-container">
            
            <ChatMessages
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />

            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </ div>
        );
      }
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
