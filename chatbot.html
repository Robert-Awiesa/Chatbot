<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script src="https://unpkg.com/supersimpledev/Chatbot.js"></script>

    <script type="text/babel">
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState("");

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        

        async function sendMessage() {
          if(!inputText.trim()){
            return
          }
          //User message
          const newMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];
          setInputText("");

          // while async await is feting the message online this shows a loading message
          setChatMessages([
            ...newMessages,
            {
              message: "Loading...........",
              sender: "robot",
              id: "Loading....",
            },
          ]);

            //After the response arrives, the loading message is replaced by the robots response
          const response = await Chatbot.getResponseAsync  (inputText);
          setChatMessages([
            ...newMessages,
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID(),
            },
          ]);
        }
        // An event lister for enter key to send message.
        function keyPress(event) {
          const key = event.key;
          if (key === "Enter") {
            sendMessage();
          } else if (key === "Escape") {
            setInputText("");
          }
        }
        return (
          <>
            <input
              className="chat-input"
              placeholder="Send a message to chatbot"
              size="30"
              onChange={saveInputText}
              value={inputText}
              onKeyDown={keyPress}
            />
            <button className="send-button" onClick={sendMessage}>Send</button>
          </>
        );
      }

      function ChatMessage({ message, sender }) {
        //const message = props.message;
        //const sender = props.sender;
        //const {message, sender} = props;

        /*if(sender === 'robot'){
        return(
          <div>
            
            {message}
          </div>
      )
      }
      */

        return (
          //position of messages
          <div>
            {sender === "robot" && <img src="robot.png" width="50" />}
            {message}
            {sender === "user" && <img src="user.png" width="50" />}
          </div>
        );
      }

      function ChatMessages({ chatMessages }) {
        // returining list of messages
        return (
          <>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </>
        );
      }

      function App() {
        //Lifting states for every component to be abe to access chatmessages when needed.
        const [chatMessages, setChatMessages] = React.useState([
          {
            message: "Hello chatbot",
            sender: "user",
            id: "id1",
          },
          {
            message: "Hello! How can I help you?",
            sender: "robot",
            id: "id2",
          },
          {
            message: "what is todays date?",
            sender: "user",
            id: "id3",
          },
          {
            message: "Today is June 2",
            sender: "robot",
            id: "id4",
          },
        ]);
        //array destructuring
        //const [chatmessages, setChatMessages] = array;
        //const chatMessages = array[0];
        //const setChatMessages = array[1]
        return (
          <>
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
            <ChatMessages
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </>
        );
      }
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
